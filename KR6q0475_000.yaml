front:
  text: 南岳繼起和尚大宗堂錄彙自序庚戌長夏病榻山中念行腳高士囊缽蕭然不獨古人語錄不能購與我同生此世者尚不得讀我全書秪因卷帙浩繁慨然於諸會錄中取其語之簡直者釐為十卷曰大宗堂錄彙其實如樹泉報慈甲辰湘雲館散錄堯封後錄皆於古人說不到處盡心而出一字不可捨者無以得此失彼反使老僧賺卻闍黎壬子九月霜降第一日退翁自序南岳繼起和尚語錄總目卷之一住常州夫山祥符寺語住台州天台國清寺語住蘇州靈嵒崇報寺語卷之二住蘇州靈巖崇報寺語卷之三住蘇州靈巖崇報寺語卷之四住蘇州靈嵒崇報寺語住蘇州堯封寶雲寺語卷之五住蘇州虎丘雲巖寺語住秀州金粟廣慧寺語卷之六住衡州南岳福嚴寺語衡州花藥寺語高峰理山寺語武昌東巖寺語住漢陽大別山興國寺語卷之七靈巖廿一錄卷上卷之八靈巖廿一錄卷下卷之九南岳正續錄卷上卷之十南岳正續錄卷下
