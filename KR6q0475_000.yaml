front:
  text: 南嶽繼起和尚大宗堂録彙自序庚戌長夏病榻山中念行腳高士囊鉢蕭然不獨古人語録不能購與我同生此世者尚不得讀我全書秪因卷帙浩繁慨然於諸會録中取其語之簡直者釐為十卷曰大宗堂録彙其實如樹泉報慈甲辰湘雲館散録堯封後録皆於古人説不到處盡心而出一字不可捨者無以得此失彼反使老僧賺卻闍黎壬子九月霜降第一日退翁自序南嶽繼起和尚語録總目卷之一住常州夫山祥符寺語住台州天台國清寺語住蘇州靈嵒崇報寺語卷之二住蘇州靈巖崇報寺語卷之三住蘇州靈巖崇報寺語卷之四住蘇州靈嵒崇報寺語住蘇州堯封寶雲寺語卷之五住蘇州虎丘雲巖寺語住秀州金粟廣慧寺語卷之六住衡州南嶽福嚴寺語衡州花藥寺語高峰理山寺語武昌東巖寺語住漢陽大別山興國寺語卷之七靈巖草一録卷上卷之八靈巖草一録卷下卷之九南嶽正續録卷上卷之十南嶽正續録卷下
