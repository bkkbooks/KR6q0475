body:
  text: 嗣法門人濟璣等編住衡州南嶽福嚴寺語到寺周中丞衡齊居士設齊院主佛頂請上堂維那白椎師攔住曰一千年舊例打放一邊自家孫子走到祖宗屋裡管領祖宗家業一千年心同眼同道同之孫子非常之孫子一千年心同眼同道同之祖翁非嘗之祖翁今日之事一千年非嘗之遭逢乃喝一喝曰豈肯草次雷同又肯烜耀珍異像他撥置證修單行污染中聖中凡中天中人似佛似祖似古似今情存向背理涉偏枯即今座下有懼法塵如畏三塗底龍象同聲念摩訶般若波羅蜜多良久高聲曰請觀法王法法王法如是便下座掃最勝輪塔弟子信辨請上堂拈讓和尚香曰舊吳嶔崎孫子出身三峰腳下水陸四千里程敢道來添聲價遂插香曰一真能敵千假乃就座僧才出師曰猛虎便騎僧即下去師曰有鬚便捋良久舉讓和尚住此山日示衆曰一切萬法皆從心生心無所生法無能住若達心地所作無礙非遇上根宜慎辭哉師歎息久之曰為人後者而不發揚先宗何補哉不見臨濟上堂曰大凡演唱宗乘須一句中具三玄門一玄中具三要有權有實有照有用無一人不上根視之無一辭不向上慎之一句中不具三玄則語有路人根立見偏情滲心生法住所作不能無礙好道心地洞達敢言三玄三要是決定少不得底敢言三玄三要是決定少得底所以我二十五世祖慈明禪師唱讓和尚之道於茲直得草木叢林是佛蠢動含靈是佛遂見音聲鳥飛鳴般若臺前娑羅花香散祝融峰畔又經五百來年我首座賦德山繼住縱橫放肆群觀目眩一日上堂曰若用一毫氣力支撐是邪法非佛法也摧頽老子來撐個破院尚肯藉筋骨之力翻阿郎舊案於祖宗田地加一壞土隨起立顧衆曰莫謂行道三十二年敗缺愈甚法孫得坤厚請上堂喝一喝曰佛草料喂馬老漢面無慚色小智未免驚疑有嫌佛不作者併這一分亦不受奇哉奇哉莫輕莫輕古冢堆裏未必盡是死人不虛從九馬嘴惡浪顛風過來佛佛祖祖你道可是住得手住得腳底時節德山都寺信慧請上堂是義學是玄學請過一邊立地我家禪和子粗糙手腳猶自可眼光橫起百千諸佛來也沒些情面家人過犯罪坐尊長倘或無理待老漢分疏早遲八刻也坐在曲彔木上一味搬美古人閒家具全不照管自己又不照管目前人情之外別有佛法不不下座侍者敘殊革掃師祖山茨和尚靈塔請上堂松根石上四顧寥寥看雪竇老子胸膈間似有一段說不出底話五百年後得個知己乃自點胸曰今日為他說出驀拈拂子曰相見從容莫等閒人天景行存高躅他若不能忘情道此話當年說出也擲下拂子曰山茨和尚若在必然笑曰不過逢場作戲耳遂顧左右曰還信得及麼便下座衡山邑侯王輔豫法名本廉請上堂風雲不次第日月有恆常賓則始終賓主則始終主連喝兩喝曰擔個險將蜜果換苦葫蘆供客不嫌異常者自然知得主道周匝執一不化者難得不訝酬酢乖離乍入叢林望之尚遠久親名匠謂老漢何又喝兩喝下座嗣法龍潭超請上堂謹此奉聞釋迦世尊已成正覺彌勒大士當來下生舊吳老李與杖笠南來放開肚皮長歎一聲水中石子青赤山頭木葉紛披尚有一端曾未舉昭鱗灘大巖灘一連過了若干灘不得聞鑼灘子力如何免唱行路難卞太翁孝旨居士請上堂衆集師曰近前來老僧共你葛藤一衆拶上前師曰來則來也看你爭生去得衆默然師曰古佛古佛葛藤到這個地位尚要討添驀拈拄杖曰穿破天下人髑髏一著巧說不得只在心傳卓一卓曰觀世音菩薩若無遣蛇手誤殺世間人隨即旋風打散復就座曰妙喜老人說得好度體裁衣量水打碓毫髮不差且居門外明日衆請上堂不得入門在門外莫貪落花紅滿地須知芳草碧連天切忌動著動著三十棒何故今朝若不盡法他年爭得話行闔山諸尊宿請就中山禪院上堂驀拈拄杖曰虛空撲下來急忙地偃身縮項秪為不曾踏得著別峰地面卓一卓曰這個所在日月照臨之不加明雲霧籠罩之不加暗象龍騰踏不為喧人煙杳絶不為寂從來與般若相為表裡所以有隱有顯有榮有衛且今日風定氣澄主賓投洽個段綢繆從什處得來復卓一卓曰蒼蒼舊閣閒田地一度看來一度新便下座前一日迅風特異尹太僕為庵居士莊嚴實際上堂喝一喝曰是如理句是依法句是依智句眼色眼識性無依住耳聲耳識性無依住鼻香鼻識性無依住舌味舌識性無依住身觸身識性無依住意法意識性無依住是句依法依智不為證小法為如來大解脫之門不消瑪瑙為樞赤珠為柱玻璃為扇黃金為閫然後稱是如事句所以靈嵒門前路往復行大步踏得如理句生也不道死也不道踏得如事句佛亦不拘祖亦不管為庵居士向及靈嵒之門痛領靈嵒毒棒毒喝今日人天衆前肯復造次便下座陳觀察頡仙二七上堂顧視左右曰汝諸高流尋常打算佛是何者名法是何者事禪居何地道行何路心作何顏性作何色相似表顯文字差排則不得也大丈夫自家屋裏物有什麼難見喝一喝良久曰哭倒湖南百萬家觀察清名在天地指南觀侄禪師請上堂大喝一聲曰劍刃上拾得全身何患一切處不解脫不成立乃於空中作世字曰必待安住如是三法名為涅槃恐大迦葉笑顏不開何故聻正法眼藏卻成剩局了也良久呵呵大笑曰正法眼藏涅槃妙心相去一丈相去五尺苟以丈尺論量是為實相是為無相驀豎拂子曰我此微妙法門秪為一代時教管攝他不得方才出得身拈得起隨顧左右曰喚作拂子則觸不喚作拂子則背速道旋放拂曰不是冰稜上度過九鞠來未免視為入道之初章復喝一喝曰笑兮哭兮百丈師舌吐黃檗非真苦擲鉢老僧冷眼看他家跳出戴角虎到湘潭護法衆居士請于碧泉禪院上堂喝一喝曰是甚生次第事長沙路湘潭路迢迢出入無門戶妙語不多親言舉似管他稱釋迦之談誇毗盧之句若論人十方蹴踏忘回互若論境風嚴歲逼崢嶸暮若論法日用紛綸何曾錯老僧大宣祕伽陀受持靈驗超諸數復喝一喝曰千經萬論繡煙霞冬到寒食一百五衡州花藥寺語到寺院主文周請上堂繼起繼起寒天著火向妙喜妙喜夏月取涼行天山口頭箭佛果殿角風聲價千年定遭逢一日同眼光籠翳客徒自話西東三卷正法眼人天俱絶工一軸單傳表祖佛一門通作凡作聖為電為風南嶽而下誰曰不中而得不得其在而躬若謂不然且聽吽吽擲拂子下座衡州諸護法宰官請上堂僧問石古苔紋緑林疏殿角紅風致宛然敢請料揀師曰領在衆聖之前曰作境話會得麼師曰莫見解入微曰看取從上師曰不爾依位住曰別展機權光彩異師曰且怪老僧不得僧問一句當天是說取行不得底如何是行取說不得底師曰速展驥足僧作禮師曰漫馳小道曰不易師曰寧容可否之間乃曰萬般施設只如常又不驚人又久長驀拈拄杖曰俊哉俊哉佛出世來不為別事祖祖相傳至南嶽老宿施設此土八百餘年到老漢手裡卓一卓曰不覺不知尊者益見其尊貴者益見其貴凡情勿使安卑聖位肯容矜大敢加名曰禪敢加名曰道又卓一卓曰秪要明取這一竅呼之禪也好呼之道也好呼之凡也好呼之聖也好又卓一卓曰恢廓無涯妙門勝伏河沙智境是渠能扼領要下座花藥衆檀越請上堂僧問伸正義於千載之下何格式師曰立其綱後者加勇曰爭傳誦之師曰汝豈不是聞鼓聲來耶曰合先意否師曰抑想餘風曰幾人知歸師便打僧問便與麼去信是金毛師子途路迂回底肯與他拄杖麼師曰遂為常曰然則主賓不易師曰明陳其故捷於一朝曰益見歲寒之色師曰如其不然紛紜何益僧作禮曰個是衡州花藥山裡段話師乃就座良久曰將本道公驗驗天下衲僧副眼目隨喝一喝曰歲月將闌天光普寒汝水東來點滴是凍飛騰直上三十三不消鎖斷奔馳不離當處常湛然推過來作個甚語話派下令行義例常準格外風氣吾亦要知龍蛇走玉石分緇素別猶豫決受用可常保復喝一喝曰非此可能哉佐領程護法請上堂有一句不出山門天下共聞其有一人不聞老僧得大過患而今南南北北大家小戶若高若下若長若幼誰不知臘月三十日到也何嘗從花藥寺解脫門般若門涅槃門傳出去當下得旨則內心安裕外相雍穆現前坐取宴逸將來動邀福慶百年千年年年處解脫之場千日萬日日日行般若之路敢對人天廣衆不惜肝膽秪圖先宗有據吾道益明擲拂子左右顧視曰久立不當便下座丁未元日上堂兼謝花藥院主文周山學拈香畢乃就座曰一向不存軌則底到這個時節少不得拈一片安放爐內兒孫雖在途中祖父無非家舍一番新一番舊佛法人事相資成就遂起身曰看看主賓風味一堂好歡然舉目千峰秀供白雲老和尚上堂一口生下十多子兄是第三我第九憶得庚午在萬峰新年佛法各出手推倒座上蘇老翁打開憐兒張笑口傾來栲栳沒帳底如珠磊落盤中走個段風華壓古今嘖嘖叢林誠罕有屈指春光四十番白雲篆塔苔花厚瀟湘鼓柁老懷榮我父我兄知我者神山遠豈在天上杖短不及悲衰朽袖中一瓣付阿孝相期此日鳴瓦缶驀拈拄杖卓一卓曰供我人天大導師匝地盡作金毛吼南臺孝姪補住白雲江頭別去瓣香寄供期正三日為上堂長山李居士誕日請上堂僧出曰其事云何師曰秪可稱揚曰雲幢月蓋盡演梵音師曰徒為劑量曰祝融峰還點頭麼師曰看後五日乃曰一松一竹一溪雲好尊古佛樣子只可起而稱揚若為從而劑量五嶽峰巒群生睹見虛空演喻隨地彰名饒伊辨若懸河智如流水法身邊量分疏得孤真穎秀報化之緣添飾得五彩橫飛祖師西來宗門舉令不可將為小小日月旁照三天下正照四天下九九八十一須知色香外別有段事六味三德供佛及僧豈徒然哉卓拄杖曰據仁者分上宜作禎祥永為盛事上元日羅總戎君錫法名濟顯請上堂驀豎起拳顧視一衆曰未識識取旋放拳曰前聖所知轉相傳授心性未起是如來大智慧光明心性起時是祖師大智慧光明汝諸人於拳作拳想非拳作拳想如來大智慧光明祖師大智慧光明盡成世流布想一切聖人有世流布想無有著相所以不壞世間相而能談實相即今天上月圓人間月半天上人間流光不斷達磨大師來震旦後橫機諸大老各各闡揚宗旨有一不視超諸位何能真際平提神通各露復以拳擊案曰日照月臨天長地久匪異人任到寶安法孫賓日請上堂一衆集定師曰將謂惠汝三昧良久曰然則今時尊宿朝暮以曠險辭意為飛為伏唐突參承平塗學黨何心哉請試甄別指喻非指馬喻非馬知汝不甘心心是佛智智是道肯諾全否開得一片田九夏勤勞收得一籮粟三冬受用老少相依上下歡悅達磨免泛重溟神光省埋深雪天下本自太平將軍何妨施設卓拄杖一下曰獲大富而濟有餘只在現前升於堂而入乎室寧須異日顧視左右下座次日監院直指原石同山鄰諸護法居士請上堂急切相投待擘開兩片唇皮方使慶快平生驀拈拄杖曰上上根人自然發笑良久曰若執自然即屬自然別倚因緣又屬因緣個上座本非因緣且非自然卓一卓曰一衆睹見盡攢眉有甚冤家難解免看他伎倆卻如文光錢買得陳姜二兩單單一味生辣難於上口然而在賓全主在主全賓於理理合於事事圓復卓一卓曰演出波羅蜜恰似天邊月高峰理山寺語師誕日法子雲蓋豫請上堂秪知今日明朝不知明朝今日不知明朝今日爭知今日明朝今日溪山明朝雲月溪山雲月知則天長地久雲月溪山不知則嶽拔河流嶽拔河流忘觀照泯實相天長地久圓萬象攝森羅一切處示人以無示而分別不行毫忽間聽之於無聽而歷然如對敲禪床一下曰會麼要知明日會取今朝衡齊居士生辰法中諸昆慶誕請上堂拈起拄杖曰一衆總有分付處願得雄偉之器以彰祖烈為來者益慶快莫大布詞展意若論佛千年常住輸今日據我法不磨智勇超前烈至於道卓拄杖兩下曰重嵒疊秀看兼到賓主欣逢師資奏妙曩謨佛曩謨法曩謨僧真實道復卓一下曰珍重仁者綿亙古今卓立群品千聖同音嗣法智度勝請上堂隔江望見樹影道盡是祖師指出底彼彼出家彼彼行腳這裡是理山寺入得一重是硯子居終日侍從底是擲鉢老僧腳下物何勞他無齒漢子指手劃腳然後外息諸緣內心無喘喝一喝曰我臨濟兒孫肯借鼻孔出氣湖南藩伯郎定庵偕檀護紳士陶密庵諸公主人破愚鐵目請于萬福禪院升座旋視左右曰今日一會何異靈山設有道孟浪無過和尚老僧點首曰好怪汝良久曰信受如來不思議身信受如來不思議音聲信受如來不思議智自然興起正勤不怯不退拈拄杖卓一卓曰在耳曰聲在目曰容聲應乎耳可以聽知容接乎目亦以儀覿發揚蹈厲以拓其智上下交融進止有度總之開發顯示諸佛正真之道再拈拄杖卓一卓復舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人白雲端和尚拈口二尊宿各有一處打得著師曰若論據款結案不道全無銖兩然則難逃五祖師翁說他語拙夫舉一隅不以三隅反則不復也臨濟家法是你涯際得底是你刻畫得底是你汗漫得底昔人盡其機智列門庭製要訣不過倣佛皮膚絶非骨髓依稀名相何關旨意二尊宿是入室真子不同門外遊人只消此兩句草一個字豫有的而奪有準照含用而用挾照正正堂堂何啻八面禦敵但見波濤湧不見海龍宮老僧操柄蒿枝拂大蹈步四千里豈圖掃盡竹木精靈稍稍令方來知有且道今日是出不出為人不為人乃復喝一喝曰毫釐之差天地懸隔到華林法孫定山會領監院實刊請主席上堂老漢茲者不是時中出入游戲切實為諸人一段大事因緣既不肯埋沒後學又爭敢刻剝古人大空小空使得慣不怕不聽教詔禪和家天長地久日子何在熱忙單刀直入不嫌鹵莽放一線路未必算是紆回顛言倒語底我說此人應與他交椅坐應時及節底應與他板凳坐理喪情亡底應與他繡墩坐知恩負恩底應撥選三十人伶俐侍者日日燒香供養他昔僧問忠國師如何是本身盧舍那國師曰與我過淨瓶來其僧過淨瓶與國師國師曰卻安舊處著其僧安置淨瓶還來問如何是本身盧舍那國師曰古佛過去久矣未曉之徒看老子向紫羅帳裏撒真珠雖然如是曉者還稀良久曰收便下座到嘉魚麻邑宰揚言諸當事任刺史仙孟諸縉紳文學衆善信居士諸山大德請就法華寺上堂拈拄杖曰嘉魚一丸地從來出生撐天拄地無情面漢子在儒在佛總不肯囊藏頭角老僧往返八千里特特到來為他點開光明又肯懼境藏形隈刀避箭說凡了凡說聖了聖驀卓一卓曰試請詳觀良久復卓一卓喝一喝曰鏗鏘燦爛洞人天倫序安和萬象宣大智當筵難隱覆只教領攬在機前到簰洲廣賢院主端次同諸護法檀越請上堂惺惺惺惺莫待老漢惡罵有頭角兄弟不是老漢不解摩捋你溫撫你開張這惡潑門戶見兩度三度呼喚不回呆呆地坐看北斗立覷黃河有三言兩語難為出口驀卓拄杖曰盡乾坤人口到這裏百雜碎衆中有一人大肯去安樂去猶是傷機之患我言雖重奉勸思存武昌東巖寺語佛誕日汪觀察悔庵程經也夏孟紹蕭培元諸居士請上堂遂拈香瓣在手曰擔水河頭賣人見盡怪笑家業祖宗傳不奉終非孝插香曰此日天下同幾人通此竅就座曰仰瞻俯視地久天長擎香無貢高之過散花有無盡之懷駿奔祖廟端頌無疆顧視左右曰請衆置問看老僧答僧出遂下座曰可有少分相應竟陵死心道人本覺請上堂僧問點著便轉早成鈍置三三四四爭免郎當師曰我一向在湖南曰忙忙者匝地普天師曰不是一日行五百里順風難得這裏相見曰恐成途轍師曰礙我行令曰莫將泥水滯春風師打曰速退讓好人出頭乃拈起拄杖曰總不敢與這上座齊肩並躅者卓一下曰蓋為他機軸出在臨時饒你縱變無方又卓一下曰他肯守定一路更問如何是他正主擲鉢老僧替他放一線南嶽一宗震耀天下諸方因甚各說異端良久曰老和尚粗心轉盛復卓一下曰不是一類秪可旁觀陳居士華卿請晚參會取會取驀豎一指曰俱胝好宗師接機慣用此不知死去見閻王可能與今日相似連忙放下手曰我且收起這一指看你諸人眼睛烏律律地知他是活是死天然智光二禪宿領法華社居士請上堂僧出師曰是從天降下是從地湧出曰道看師曰今日一會未是小緣曰有人領話師喝曰支離鉉辨辱我宗風就座良久曰諸法從本來常自寂滅相上則在天下則在地中則在人左來左中右來右中僧問疏山如何是法身山曰枯椿如何是法身向上山曰非枯椿真金須入火他未彰名余不能取汝諸人道古廟香爐靈從何來聖從何起喝一喝曰如此遭逢肯受欺丁未四月六日上堂今日廣陵李仲連先生元配金孺人四十周忌請南嶽福嚴老和尚就于江夏東巖同真堂上堂且道說什麼法佛眼和尚曰今時人須自尊自貴自成自立方有個休歇處記得丁卯四月六日先生於南通州李家寶儉堂發真實菩提心自誓從今身直至佛身為清淨大沙門故四十年中得遇真善知識得真實透明佛祖綱宗十年居學地真實事師三十年行道於天台南嶽江淮兩浙教化真實大衆而得正因出家正因行腳真實明道之士嗣其法實始於孺人放身命底時節大衆要識昔之仲連先生麼即今說法之南嶽和尚也南嶽和尚所說之法即仲連先生始終一貫之法蓋和尚開堂歷三十年說法已四十年何故長阿含經載佛佛出世南家室有子孫有神足有侍者則家室一法也存亡法也修短法也苦樂法也舍諸法一法也何事非法何往非法今所說之法一法也此法強會不得緣差不得用力取不得有意舍不得時節若至其理自彰所以一切處尊貴一切時成立卓拄杖一下曰不得個休歇處光陰莫虛度山鄰弟子李勝宇黃見之蘇文元陳瑞伯等請小參就人揀辨還當得本參底事麼老子不是泥捏底聖僧忍見諸仁進前退後古人事不獲已齒罅縫落出一段兩段本自峭絶而今阿誰弱過伊肯與折開只管隊隊上來就我商量老子事不獲已也和你商量二十楖粟棒劈脊㨟來你但領下明朝看消息弟子魏厥修法名本初請上堂今日大似在賓全主令豈知達磨未西來父母緣生口便不肯挂上壁諸人也曾打從知識叢林過來曲彔木上早晚提段突兀話也未近日南方動則揮拳撒掌鬥打紛爭約至理論便恁麼去陷下粗心阿誰救得若或細針密線暖室裏商量只恐黃面傷心看他法久斃生何忍脅肩諂笑良久曰向後踏著正脈莫辜負人好法子汾俞昭請上堂一夜作竊不覺天曉鳴鼓升堂盡情說了卓拄杖曰白拈一派源出獦獠二株獨挺於朱陵五葉孤秀於萍實又卓一卓曰子承父業孫重祖華復卓一卓曰接人之際不竭心力而與者非夫也擲拄杖下座嗣法九峰紀率闔院大衆請上堂臨濟初住河北首唱斷際綱宗於人境法不止三致意益為運老輕觸大中善弄爪牙殃及兒孫若干建立擲鉢老僧兩手空索索張口乾曝曝新九峰咳唾掉臂風動雲從曾不借力於父祖肯學他臨濟架險憑空老僧今日力疾上來又肯飾詞褒獎炫子之長喝一喝曰誰為臨濟誰是臨濟者次日山鄰衆弟子請上堂僧問東西林下鳥一段好音聲出入耳門寧有關節師曰老僧不欲亂天下人眼曰如斯爭奈何師曰你有一問答你一轉曰不才謹退師曰若有疑慮不難方便僧問花開本有風光鳥語全提妙用前僧已納敗闕某也敢復支離師曰老僧敗缺尤甚曰幸是師曰且看支離曰流布諸方恐難收拾師便打曰始終作主師又打曰勿使外人聞此粗語維那白椎曰法筵龍象衆當觀第一義師曰且說個什麼即得旋視左右曰非但昨日今日連贓捉敗亦不為遲遠近隨風而湊都道擲鉢老僧兩日在九峰上堂各各塵劫段不思議事可得當下明白若使無所關領而去辜負遠來不易若道且坐喫茶這個是驢前馬後事曳過旁僧又非公境界隨卓拄杖曰劈腹開心別處即不說也下座到洪山長老明若同諸院大德請就本寺上堂擲鉢老僧三十年千言無一中豈單單不上人鉤此時乘聽衆未出三門與他明白一下隨喝一喝曰實謂如斯北邙山下千丘萬丘滹沱家法曰第一句薦得堪與祖佛為師第二句薦得堪與人天為師第三句薦得自救不了不欺人眼底看此翁言之當否福嚴直謂不然第一句他家無你話論處第二句勸你擔出看第三句軟嫩嫩地實情無力良久曰肯自領過但請先行便下座到白鶴院住持玉芝同衆護法居士請上堂千年一遇正在此時乃震喝一聲衆懵然師曰疑情未息如何遣撥良久曰諸苦所因貪欲為本若滅貪欲無所依止大大上大人在處勞勞隨所鹿鹿豈但志公不是閒和尚隨自點胸曰且道他畢竟圖個什麼復震喝曰鈍根阿師下坡不走快便難逢住漢陽大別山興國寺語到寺文山弟子密粹同居士蕭文遠請上堂今時叢林中兄弟那個不自承當低昂佛祖陶鑄人天老僧樂與羽儀肯走作你肯抑捺你既承當得下肯受人抑捺肯聽人走作有兩句說話三十二年不曾輕易擔出到這裏忍不得也喝一喝曰一例順時祝贊決非宗門建立卓拄杖下座劉方伯元伯請上堂盡大地人各各置一問問問各別秪消寶應道個好字直得天下歸仁且道節文在什麼處今時學般若菩薩例皆精緻鬥對希圖跨灶佛祖福嚴分明舉似臨濟出四種料揀四種照用七百年來不敢廢者是叢林向上關若人蹈著喜無量今日有僧出來道請老和尚領話也盡力向道好其或進曰過分教令向道好好驀拈拄杖曰木上座尊意謂何良久自代曰好心得好報半園闍黎請上堂有段話問師僧家據你胸襟吐出來看若起解會心便塞斷胸襟了也胸襟是你自己底胸襟什麼人塞斷得他你又何苦要塞斷他胸襟有什麼所在停蓄得纖毫恁麼則胸襟究竟塞他不得是凡是聖是染是淨是法身是般若是解脫但吐得出便是大火聚便是太阿劍不消用力只貴臨時而今是各展胸襟之時喝一喝曰若是師子兒自然增勇健僧問名不干事事不干名依執滯名於他玄隔是耶師曰更有伶俐者曰有一句未當情師曰既墮中流須早憤發曰恐亦未到玄源師曰非究理也本寺監院嗣宗同徒瞻初請上堂若肯欺聖罔賢埋沒諸人便依根布葉狎獵紛披去也既不爾者釋子聚會不可作世諦流通如此則將何饒益請法聽法諸賢究竟將底消結今日這段去就喝一喝曰你行腳之士須開行腳之眼夫行腳眼非慧眼法眼佛眼所能較得況天人之肉眼而能窺竊得畢竟要我說與你只要你一信可不省力佛林庵無染禪者請上堂在昔有個老和尚一日示衆曰不得閒過念佛念法念僧會中出一員不帶伴侶底禪客近前曰某甲單單只念自己老和尚痛叱為驢據福嚴看這老和尚原不曾輕視此僧但不知此僧可看得這老和尚上眼也未今日平心與兄弟商量這老和尚是誰便是有佛處不住無佛處走過底老趙州打從十八上破家散宅了到處孤迥迥峭危危過平常日子一旦年老心孤無事生事教好人家兒女緊靠著三寶過活不道他無業性將來撲在人天位中下淚謝過已遲八刻也這米囤子一向道莫歷他門戶又道才有纖毫萬劫不如為什麼臨老眼花屈膝妥尾一至於此雖然莫聞我與麼說話便坐定在空劫裏許不見三峰老師三十年只教看個竹篦子話道喚著竹篦子則觸不喚著竹篦則背有什麼人向什麼處安排他正大修行人著衣喫飯屙矢放尿闕一不可才擬作佛太費心力喝一喝曰佛眼法眼盡打睡天眼肉眼何足貴西來大意久浮沉不早舉似恐後悔本山定姪禪師率監院嗣宗同護法衆居士請上堂今日齊飯較細良久曰阿姪定興國稽首方丈曰先白雲出世二十餘年掌叢林者七非人類精奇不敢登其門一時王公貴人循循巾鉢此山實為發源之初地伏乞和尚垂念同一佛生披露微言為世信式老僧道我師兄久矣為天下信為天下式我何能信式我師兄記得白雲乘和尚住此山日僧問如何是一句底賓乘和尚道黃鶴一去不復返僧曰如何是一句底主乘和尚道白雲千載空悠悠僧曰錢是足陌乘和尚道今日齊飯較細師乃召衆曰來來四十年前齊飯較今日齊飯何若體理得出非父不生其子體理不出非子莫顯其親夫沙門者播揚大法須從自己胸襟流出方才蓋天蓋地白雲和尚等閒吐一句子一回思想著豈止一傷神大千俱壞此句不壞其有不信而式者可不道今日齊飯較細李學使元仗請上堂端天下英異之士之所趨向使之望風而馳不失尺寸非是各自有禪各自有道此外更有何法亦非樁立意根收其奔放之心曲制潛匿然後謂之克己復禮請觀古人之所對者而發之昔有僧問禪師自心他心得相見否對曰自己尚不見他人何可觀又問罪福之相如何了達得無同異對曰絺綌不禦寒今之學者謂自心非外有妄盡而自返禘自既灌而往者吾不欲觀之矣直趨祖佛之域頓獲聖人之心有故也卓拄杖曰舉似天下人饒大參型萬請上堂曖顧一衆震喝曰能使王公貴人聞聲而悟瞻顏而證非宿具深慈真願雖親見尊宿如汾陽趙州有大聲價秖高虛氣那得收實效於意言之表而光遠他耀今者慧業文人虛懷問道空腹老僧難為酬答普請大衆各施神用良久曰盡乾坤是當人自體形著影出聲呼谷應學者囿於見聞使聖人光大通變之道反膠瑟柱然則禹之治水孔之聞韶然乎不然乎復喝一喝顧衆曰參下太翁孝旨居士請上堂舉汾陽先祖道汾陽門下有西河師子當門據坐但有來者即便咬殺作何方便入得汾陽門見得汾陽人師曰腳下孫子嘗閲臨濟正宗記從南嶽讓祖而下中心悅服者只得十一世至我祖無能尚矣今日不得不有說焉老大宗師自不解作主容個畜生不識好惡觸忤賢良所以自到興國每日打開兩扇門大坐當軒凡有來者不用方便亦無揀擇個個許他升其堂入其室親見其人他若是個人語也著默也著四威儀中何處不是他放身命處最可笑者疏山矮師叔他道咸通年已前會得法身邊事咸通年已後會得法身向上事乃高聲曰菩薩子不信打鼓普請看我孝旨居士永昭今日較昨日差幾尺地良久曰前三三與後三三落得身心從此閒婁孝廉南石居士法名于衡請上堂淨智為天正智為人智智流通曹源一派便展轉相續去也所以向上人不可思議而今但一切時中超超然于等妙二覺之表決定不流至第二念一不拘滯於佛境界一理一切理一事一切事一心一切心一道一切道別無照顧別無曉了別無趨向別無保任天地河海風雲草木盡是助顯你思議不及一段事但得現前兄弟點首歡喜老僧得也上堂舉僧問洞山初和尚如何是道官禁不容潑屎潑尿山曰卓睡來還合眼麼僧曰擬向如何亡僧還喫飯麼山曰失卓竟不向上道與他後僧持此語問徹和尚洞山意旨何如伏聞鈍置人者遭人鈍置徹曰虎鬥龍傷嘗言達磨大師缺當門齒乃曰洞山相承因言曉人之旨吐詞如磚塊鐵屑非有所造也徹公重糝姜椒益使食者難于下咽致令多少旁觀拊手大笑良久曰嚼得碎者自不如此法子嵒頭徹請上堂佛佛出世有諸人一坐具地南北東西橫豎不出佛地位三身四智露冷風寒八解六通泉飛石麗目前旨略不怕諸方取則更有一格莫作等閒咬人火急者宗脈未露見你氣息取辦圓頓恐覓個出頭處不得何也卓拄杖曰大統綱宗中事別處往往放過德山副寺泳明請上堂作者相見何用煩詞苟不盡意殊難為懷佛祖大意淺而易見故作崤函老僧罪過旋視周匝曰天高而居上地卑而居下中問黑白貴賤趨趨翔翔不待緣木求魚各各見義勇進或不至勞而無功拈拄杖卓一卓曰豈是強生節目什邡院主念純同衆護法居士請上堂僧問併卻咽喉請道一句師曰有恁麼心行曰事須斟酌師曰昨日不得已白鶴院裡曾小小納一上敗缺曰意不至此師曰今日不過更要我大大納個敗缺僧作禮曰爭敢師不顧乃就座掀髯一笑曰人人總道個老子竿木隨身逢場作戲誠如所言佛滅二千歲比丘少慚愧卻成授記老福嚴了也禪風日下從迷入迷者自甘流轉知識出世如救倒懸那討閒心游獵州縣托拾山水而今誠實說向有事近前決擇無事潔淨心地莫心生閒草卓拄杖曰非常人物領之一字也不消得便下座王大參茂衡請為令兄節推對靈位升座古來有輩尊宿秖教人心同虛空去如枯木石頭去如寒灰死火去據擲鉢老僧猶自內身外器岐而為二不達如來意枉服大乘藥無邊身菩薩不見如來頂相無邊身外別無如來若見如來則有二如來也所以道但無諸見即是無邊身外道樂於諸見菩薩於諸見而不動如來者諸法如義如即無生如即無滅佛身無為不墮諸數敢問即今節推王公之靈安之聖位耶安之賢位耶安之天上安之人間不見道內見外見俱錯佛道仙道俱惡以故祖師直指一切衆生本心本體本來是佛且不假修成不屬漸次一句如何通信喝一喝曰我今為汝保任此事終不虛也
